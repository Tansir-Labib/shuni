name: Shuni Build APK & Deploy Landing Page

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # Trigger on version tags (e.g. v1.0.0)

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages and creating releases
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queue.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: 'pages-and-build'
  cancel-in-progress: false

jobs:
  build-apk:
    name: Compile Release APKs
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository source code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup JDK environment (required for gradle builds)
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Setup Flutter SDK environment
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: 'stable'
          cache: true

      # 4. Fetch Dart package dependencies
      - name: Install dependencies
        run: flutter pub get

      # 5. Build optimized split APKs
      - name: Compile Split APKs
        run: flutter build apk --release --split-per-abi

      # 5b. Rename APKs to nice names
      - name: Rename APKs
        run: |
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk Shuni-${{ github.ref_name }}-arm64-v8a.apk
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk Shuni-${{ github.ref_name }}-armeabi-v7a.apk
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk Shuni-${{ github.ref_name }}-x86_64.apk

      # 6. Upload arm64-v8a target APK as action run artifact
      - name: Upload Target arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: shuni-arm64-v8a-apk
          path: Shuni-${{ github.ref_name }}-arm64-v8a.apk

      # 7. Create GitHub Release & Attach all split APKs (Runs on version tags only)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Shuni-${{ github.ref_name }}-arm64-v8a.apk
            Shuni-${{ github.ref_name }}-armeabi-v7a.apk
            Shuni-${{ github.ref_name }}-x86_64.apk
          name: Shuni Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-website:
    name: Deploy Website to Pages
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    # Grant Pages permissions
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # 1. Checkout repository source code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Configure Pages environment settings
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # 3. Zip and upload target directory to Pages
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'website/'

      # 4. Deploy the artifact to Pages environment
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
